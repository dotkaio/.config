<!doctype html>
<html lang="en">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start Page</title>
    <meta name="color-scheme" content="dark light" />
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: rgba(255, 255, 255, 0.8);
        --panelBorder: rgba(0, 0, 0, 0.08);
        --text: #111;
        --muted: rgba(0, 0, 0, 0.6);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        --radius: 16px;
        --gap: 12px;
        --max: 1120px;
        --card: rgba(255, 255, 255, 0.9);
        --cardHover: rgba(255, 255, 255, 1);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0c10;
          --panel: rgba(17, 17, 22, 0.75);
          --panelBorder: rgba(255, 255, 255, 0.1);
          --text: rgba(255, 255, 255, 0.92);
          --muted: rgba(255, 255, 255, 0.62);
          --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
          --card: rgba(22, 22, 28, 0.85);
          --cardHover: rgba(28, 28, 36, 0.95);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font:
          14px/1.35 -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .wrap {
        max-width: var(--max);
        margin: 0 auto;
        padding: 28px 18px 64px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 14px 0;
        /* backdrop-filter: blur(14px); */
      }

      .topbarInner {
        border: 1px solid var(--panelBorder);
        background: var(--panel);
        box-shadow: var(--shadow);
        border-radius: calc(var(--radius) + 4px);
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .search {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--panelBorder);
        background: rgba(0, 0, 0, 0.03);
      }

      @media (prefers-color-scheme: dark) {
        .search {
          background: rgba(255, 255, 255, 0.04);
        }
      }

      .search input {
        width: 100%;
        border: 0;
        outline: none;
        background: transparent;
        color: var(--text);
        font-size: 14px;
      }

      .kbd {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        padding: 4px 8px;
        border-radius: 10px;
        border: 1px solid var(--panelBorder);
        background: rgba(0, 0, 0, 0.03);
      }

      @media (prefers-color-scheme: dark) {
        .kbd {
          background: rgba(255, 255, 255, 0.04);
        }
      }

      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--panelBorder);
        background: rgba(0, 0, 0, 0.03);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
      }

      @media (prefers-color-scheme: dark) {
        .btn {
          background: rgba(255, 255, 255, 0.04);
        }
      }

      .btn:hover {
        filter: brightness(1.06);
      }

      .btn:active {
        transform: translateY(1px);
      }

        margin: 14px 0 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        border: 1px solid var(--panelBorder);
        background: rgba(0, 0, 0, 0.03);
        padding: 6px 10px;
        border-radius: 999px;
        cursor: pointer;
        color: var(--muted);
      }

      @media (prefers-color-scheme: dark) {
        .pill {
          background: rgba(255, 255, 255, 0.04);
        }
      } */

      .section {
        margin-top: 22px;
      }

      .sectionHeader {
        margin-bottom: 12px;
      }

      .sectionToggle {
        width: 100%;
        appearance: none;
        border: 1px solid var(--panelBorder);
        background: rgba(0, 0, 0, 0.025);
        color: inherit;
        border-radius: 14px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-align: left;
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 120ms ease;
      }

      .sectionToggle:hover {
        background: rgba(0, 0, 0, 0.05);
        border-color: rgba(0, 122, 255, 0.18);
      }

      .sectionToggle:active {
        transform: translateY(1px);
      }

      .sectionToggle:focus-visible {
        outline: 2px solid rgba(0, 122, 255, 0.5);
        outline-offset: 2px;
      }

      @media (prefers-color-scheme: dark) {
        .sectionToggle {
          background: rgba(255, 255, 255, 0.03);
        }

        .sectionToggle:hover {
          background: rgba(255, 255, 255, 0.06);
        }
      }

      .sectionTitle {
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .sectionLead {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .sectionMeta {
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
      }

      .sectionChevron {
        font-size: 12px;
        color: var(--muted);
        transition: transform 160ms ease;
      }

      .sectionToggle[aria-expanded="true"] .sectionChevron {
        transform: rotate(90deg);
      }

      .sectionGrid[hidden] {
        display: none;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: var(--gap);
      }

      @media (max-width: 1080px) {
        .grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }

      @media (max-width: 920px) {
        .grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 520px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .card {
        border-radius: var(--radius);
        border: 1px solid var(--panelBorder);
        background: var(--card);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
        padding: 12px;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: center;
        min-height: 64px;
        transition:
          transform 120ms ease,
          background 120ms ease,
          border-color 120ms ease;
      }

      .card:hover {
        transform: translateY(-2px);
        background: var(--cardHover);
        border-color: rgba(0, 122, 255, 0.22);
      }

      .icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.06);
        display: grid;
        place-items: center;
      }

      @media (prefers-color-scheme: dark) {
        .icon {
          background: rgba(255, 255, 255, 0.06);
        }
      }

      .icon img {
        width: 22px;
        height: 22px;
      }

      .cardText {
        min-width: 0;
      }

      .cardTitle {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .cardUrl {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .footer {
        margin-top: 44px;
        color: var(--muted);
        font-size: 12px;
      }

      .modalOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 50;
      }

      .modalOverlay[data-open="true"] {
        display: flex;
      }

      .modal {
        width: min(860px, 100%);
        border-radius: calc(var(--radius) + 6px);
        border: 1px solid var(--panelBorder);
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
        padding: 14px;
      }

      .modal h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .modal p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .modal textarea {
        width: 100%;
        min-height: 260px;
        border-radius: 14px;
        border: 1px solid var(--panelBorder);
        padding: 12px;
        background: rgba(0, 0, 0, 0.03);
        color: var(--text);
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", monospace;
        font-size: 12px;
        outline: none;
      }

      @media (prefers-color-scheme: dark) {
        .modal textarea {
          background: rgba(255, 255, 255, 0.04);
        }
      }

      .modalActions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--panelBorder);
        color: var(--muted);
      }

      .small {
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="topbarInner">
          <div class="search">
            <span class="kbd">/</span>
            <input
              id="q"
              type="text"
              inputmode="search"
              placeholder="Search bookmarks (host, title, URL)…"
              autocomplete="off"
            />
            <span class="kbd">Esc</span>
          </div>
          <div class="controls">
            <button
              class="btn"
              id="toggleNewTab"
              title="Toggle whether links open in a new tab"
            >
              New tab: <span id="newTabState" class="badge">On</span>
            </button>
            <button
              class="btn"
              id="toggleSort"
              title="Toggle A→Z vs original order"
            >
              Sort: <span id="sortState" class="badge">A→Z</span>
            </button>
            <button class="btn" id="openEdit" title="Edit / import bookmarks">
              Edit
            </button>
          </div>
        </div>
        <!-- <div class="pills" id="pills"></div> -->
      </div>

      <div id="content"></div>

      <div class="footer">
        Generated locally from your bookmark URLs. No remote processing.
        <span class="small">Tip: press “/” to focus search.</span>
      </div>
    </div>

    <div class="modalOverlay" id="modal">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="editTitle"
      >
        <h2 id="editTitle">Edit bookmarks</h2>
        <p>
          Paste one URL per line. Click “Apply” to re-render. Settings persist
          in <span class="badge">localStorage</span>.
        </p>
        <textarea id="raw"></textarea>
        <div class="modalActions">
          <button class="btn" id="download">Download URLs</button>
          <label
            class="btn"
            style="display: inline-flex; gap: 8px; align-items: center"
          >
            Import file
            <input id="file" type="file" accept=".txt" style="display: none" />
          </label>
          <button class="btn" id="closeEdit">Close</button>
          <button class="btn" id="apply">Apply</button>
        </div>
      </div>
    </div>

              {
                class: "pill",
                onclick: () => {
                  const target = document.getElementById(`sec-${cssId(name)}`);
                  if (target)
                    target.scrollIntoView({
                      behavior: "smooth",
                      block: "start",
                    });
                },
              },
              name,
            ),
          );
        } */

        for (const g of groups) {
          const filtered = g.items.filter((it) => {
            if (!q) return true;
            const hay = `${it.label}\n${it.url}\n${it.host}`.toLowerCase();
            return hay.includes(q);
          });
          if (!filtered.length) continue;

          const items = sortItems(filtered, sortMode);
          const collapsed = isSearching ? false : isSectionCollapsed(g.name);

          content.appendChild(
            el(
              "section",
              { class: "section", id: `sec-${cssId(g.name)}` },
              el(
                "div",
                { class: "sectionHeader" },
                el(
                  "button",
                  {
                    class: "sectionToggle",
                    type: "button",
                    "aria-expanded": String(!collapsed),
                    "aria-controls": `grid-${cssId(g.name)}`,
                    onclick: () => {
                      toggleSectionCollapsed(g.name);
                      render(currentGroups);
                    },
                  },
                  el(
                    "div",
                    { class: "sectionLead" },
                    el(
                      "span",
                      { class: "sectionChevron", "aria-hidden": "true" },
                      "›",
                    ),
                    el("div", { class: "sectionTitle" }, g.name),
                  ),
                  el("div", { class: "sectionMeta" }, String(items.length)),
                ),
              ),
              el(
                "div",
                {
                  class: "grid sectionGrid",
                  id: `grid-${cssId(g.name)}`,
                  hidden: collapsed ? "hidden" : null,
                },
                ...items.map((it) => {
                  const host = it.host || safeHost(it.url);
                  const hrefAttrs = openInNewTab
                    ? { target: "_blank", rel: "noreferrer noopener" }
                    : {};
                  const iconImg = el("img", {
                    alt: "",
                    src: faviconUrl(host),
                    loading: "lazy",
                    referrerpolicy: "no-referrer",
                  });
                  return el(
                    "a",
                    { class: "card", href: it.url, ...hrefAttrs },
                    el("div", { class: "icon" }, iconImg),
                    el(
                      "div",
                      { class: "cardText" },
                      el(
                        "div",
                        { class: "cardTitle", title: it.label },
                        it.label,
                      ),
                      el(
                        "div",
                        { class: "cardUrl", title: it.url },
                        it.url.replace(/^https?:\/\//, ""),
                      ),
                    ),
                  );
                }),
              ),
            ),
          );
        }

        document.getElementById("newTabState").textContent = openInNewTab
          ? "On"
          : "Off";
        document.getElementById("sortState").textContent =
          sortMode === "az" ? "A→Z" : "Original";
      }

      function openModal() {
        document.getElementById("modal").dataset.open = "true";
        document.getElementById("raw").focus();
      }
      function closeModal() {
        document.getElementById("modal").dataset.open = "false";
      }

      function hydrateEditor(groups) {
        const all = [];
        for (const g of groups) for (const it of g.items) all.push(it);
        all.sort((a, b) => (a.i ?? 0) - (b.i ?? 0));
        document.getElementById("raw").value = all.map((x) => x.url).join("\n");
      }

      function loadInitialGroups() {
        const storedRaw = localStorage.getItem(LS.rawUrls);
        if (storedRaw) {
          const urls = sanitizeUrls(storedRaw);
          return groupsFromRawUrls(urls);
        }
        return DEFAULT_GROUPS;
      }

      (function init() {
        window.addEventListener("keydown", (e) => {
          const q = document.getElementById("q");
          if (e.key === "/" && document.activeElement !== q) {
            e.preventDefault();
            q.focus();
            q.select();
            return;
          }
          if (e.key === "Escape") {
            if (document.getElementById("modal").dataset.open === "true") {
              closeModal();
              return;
            }
            if (q.value) {
              q.value = "";
              render(currentGroups);
            }
          }
        });

        document
          .getElementById("q")
          .addEventListener("input", () => render(currentGroups));

        document
          .getElementById("toggleNewTab")
          .addEventListener("click", () => {
            setOpenInNewTab(!getOpenInNewTab());
            render(currentGroups);
          });

        document.getElementById("toggleSort").addEventListener("click", () => {
          setSortMode(getSortMode() === "az" ? "original" : "az");
          render(currentGroups);
        });

        document
          .getElementById("openEdit")
          .addEventListener("click", openModal);
        document
          .getElementById("closeEdit")
          .addEventListener("click", closeModal);
        document.getElementById("modal").addEventListener("click", (e) => {
          if (e.target === document.getElementById("modal")) closeModal();
        });

        document.getElementById("apply").addEventListener("click", () => {
          const raw = document.getElementById("raw").value;
          const urls = sanitizeUrls(raw);
          localStorage.setItem(LS.rawUrls, urls.join("\n"));
          currentGroups = groupsFromRawUrls(urls);
          closeModal();
          render(currentGroups);
        });

        document.getElementById("download").addEventListener("click", () => {
          const raw = document.getElementById("raw").value;
          const blob = new Blob([raw], { type: "text/plain;charset=utf-8" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "bookmarks.txt";
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        });

        document
          .getElementById("file")
          .addEventListener("change", async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const text = await file.text();
            document.getElementById("raw").value = text;
          });

        window.currentGroups = loadInitialGroups();
        hydrateEditor(window.currentGroups);
        render(window.currentGroups);
      })();
    </script>
  </body>
</html>
